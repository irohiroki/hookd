server:
  host: "0.0.0.0"
  port: 9000

log:
  file: /home/rocky/hookd/hookd.log
  level: INFO
  max_bytes: 10485760
  backup_count: 5

routes_dir: /home/rocky/hookd/routes.d

routes: []
